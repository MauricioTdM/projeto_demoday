version: '3.8'

services:
  # 1. Nosso Garçom (O Frontend)
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "http://localhost:5000"
    container_name: app-frontend
    ports:
      - "3010:80"
    restart: always

  # 2. Nosso Motor (O Backend)
  backend:
    build: ./backend
    container_name: app-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    restart: always